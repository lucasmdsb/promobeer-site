<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-mail confirmado | PromoBeer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <style>
        .validation-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--color-primary);
            padding: var(--space-xl) var(--container-padding);
            text-align: center;
        }

        .validation-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: 3.5rem 2.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-xl);
        }

        .validation-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 0.1em;
            color: var(--color-primary);
            margin-bottom: 2rem;
            display: block;
        }

        .validation-icon {
            width: 80px;
            height: 80px;
            background: #e8f8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem;
        }

        .validation-icon i {
            font-size: 2.25rem;
            color: #27ae60;
        }

        .validation-title {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            color: var(--color-primary);
            margin-bottom: 1rem;
            letter-spacing: 0.03em;
        }

        .validation-text {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--color-gray-500);
            line-height: 1.7;
            margin-bottom: 2.25rem;
        }

        .validation-divider {
            height: 1px;
            background: var(--color-gray-100);
            margin: 0 0 2rem;
        }

        .validation-cta-label {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-gray-400);
            margin-bottom: 1rem;
        }

        .validation-store-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .btn-store {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: 0.9rem 1.5rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            transition: all var(--transition-base);
            text-decoration: none;
        }

        .btn-store-google {
            background: var(--color-secondary);
            color: var(--color-white);
            border-color: var(--color-secondary);
        }

        .btn-store-google:hover {
            background: var(--color-secondary-dark);
            border-color: var(--color-secondary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-store-apple {
            background: transparent;
            color: var(--color-primary);
            border-color: var(--color-primary);
        }

        .btn-store-apple:hover {
            background: var(--color-primary);
            color: var(--color-white);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body class="theme-mm">
    <main class="validation-page">
        <div class="validation-card">
            <a href="/" class="validation-logo">
                PROMO<span style="color: var(--color-secondary);">BEER</span>
            </a>

            <div class="validation-icon">
                <i class="fas fa-check"></i>
            </div>

            <h1 class="validation-title">E-mail confirmado!</h1>

            <p class="validation-text">
                Sua conta foi verificada com sucesso. Agora você já pode aproveitar todas as promoções de bebidas da sua região.
            </p>

            <div class="validation-divider"></div>

            <p class="validation-cta-label">Abra o app e aproveite</p>

            <div class="validation-store-buttons">
                <a href="https://play.google.com/store/apps/details?id=com.promobeerapp.promobeer" target="_blank" rel="noopener noreferrer" class="btn-store btn-store-google">
                    <i class="fab fa-google-play"></i> Google Play
                </a>
                <a href="https://apps.apple.com/br/app/promobeer/id1033253442" target="_blank" rel="noopener noreferrer" class="btn-store btn-store-apple">
                    <i class="fab fa-apple"></i> App Store
                </a>
            </div>
        </div>
    </main>
</body>
</html>
