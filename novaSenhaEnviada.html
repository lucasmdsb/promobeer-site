<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova senha enviada | PromoBeer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" as="style" onload="this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
    <style>
        .senha-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--color-primary);
            padding: var(--space-xl) var(--container-padding);
            text-align: center;
        }

        .senha-card {
            background: var(--color-white);
            border-radius: var(--radius-xl);
            padding: 3.5rem 2.5rem;
            max-width: 480px;
            width: 100%;
            box-shadow: var(--shadow-xl);
        }

        .senha-logo {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 0.1em;
            color: var(--color-primary);
            margin-bottom: 2rem;
            display: block;
        }

        .senha-icon {
            width: 80px;
            height: 80px;
            background: rgba(243, 156, 18, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.75rem;
        }

        .senha-icon i {
            font-size: 2.25rem;
            color: var(--color-secondary);
        }

        .senha-title {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            color: var(--color-primary);
            margin-bottom: 1rem;
            letter-spacing: 0.03em;
        }

        .senha-text {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--color-gray-500);
            line-height: 1.7;
            margin-bottom: 2.25rem;
        }

        .senha-tip {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            background: var(--color-off-white);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            margin-bottom: 2.25rem;
            text-align: left;
        }

        .senha-tip i {
            color: var(--color-secondary);
            margin-top: 2px;
            flex-shrink: 0;
        }

        .senha-tip p {
            font-family: var(--font-body);
            font-size: 0.875rem;
            color: var(--color-gray-500);
            line-height: 1.6;
            margin: 0;
        }

        .senha-divider {
            height: 1px;
            background: var(--color-gray-100);
            margin: 0 0 2rem;
        }

        .senha-cta-label {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-gray-400);
            margin-bottom: 1rem;
        }

        .senha-store-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .btn-store {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: 0.9rem 1.5rem;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            transition: all var(--transition-base);
            text-decoration: none;
        }

        .btn-store-google {
            background: var(--color-secondary);
            color: var(--color-white);
            border-color: var(--color-secondary);
        }

        .btn-store-google:hover {
            background: var(--color-secondary-dark);
            border-color: var(--color-secondary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-store-apple {
            background: transparent;
            color: var(--color-primary);
            border-color: var(--color-primary);
        }

        .btn-store-apple:hover {
            background: var(--color-primary);
            color: var(--color-white);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .senha-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
        }

        .senha-social a {
            color: var(--color-gray-400);
            font-size: 1.4rem;
            transition: color var(--transition-fast);
        }

        .senha-social a:hover {
            color: var(--color-secondary);
        }
    </style>
</head>
<body class="theme-mm">
    <main class="senha-page">
        <div class="senha-card">
            <a href="/" class="senha-logo">
                PROMO<span style="color: var(--color-secondary);">BEER</span>
            </a>

            <div class="senha-icon">
                <i class="fas fa-envelope-open-text"></i>
            </div>

            <h1 class="senha-title">Nova senha enviada!</h1>

            <p class="senha-text">
                Uma nova senha foi enviada para o seu e-mail cadastrado. Acesse sua caixa de entrada e faça login no app.
            </p>

            <div class="senha-tip">
                <i class="fas fa-info-circle"></i>
                <p>Não encontrou o e-mail? Verifique também a pasta de <strong>spam</strong> ou <strong>lixo eletrônico</strong>.</p>
            </div>

            <div class="senha-divider"></div>

            <p class="senha-cta-label">Abra o app e faça login</p>

            <div class="senha-store-buttons">
                <a href="https://play.google.com/store/apps/details?id=com.promobeerapp.promobeer" target="_blank" rel="noopener noreferrer" class="btn-store btn-store-google">
                    <i class="fab fa-google-play"></i> Google Play
                </a>
                <a href="https://apps.apple.com/br/app/promobeer/id1033253442" target="_blank" rel="noopener noreferrer" class="btn-store btn-store-apple">
                    <i class="fab fa-apple"></i> App Store
                </a>
            </div>

            <div class="senha-social">
                <a href="https://www.instagram.com/promobeer" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/Promobeer" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
    </main>
</body>
</html>
